 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sign-in.css">
    <link  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"  >
    <title>Login</title>
    <style>
         
        

        .login-card {
            background: var(--light-beige);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
            border-top: 4px solid var(--primary-navy);
        }

        h2 {
            text-align: center;
            color: var(--primary-navy);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-navy);
            font-size: 13px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--accent-blue);
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background-color: var(--primary-navy);
            color: var(--light-beige);
            padding: 12px;
            border: none;
            border-radius: 4px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--accent-blue);
        }

        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 12px;
        }

        .links a {
            color: var(--primary-navy);
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="index.html">
                    <img src="ChatGPT Image Apr 26, 2026, 09_50_21 PM.png" alt="Axis" width="50" height="50">
                </a>
            </div>
            <ul>

                <li class="dropdown">
                    <a href="javascript:void(0)" class="dropbtn">Categories <i class="fa-solid fa-chevron-down"></i></a>
                    <ul class="dropdown-content">

                    </ul>
                </li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact Us</a></li>

                <div class="search">

                </div>
                <a href="sign_in.html">
                    <i class="fa-regular fa-user"></i>
                </a>
                <a href="cart.html">
                    <i class="fa-solid fa-bag-shopping"></i>
                </a>
            </div>
        </nav>

 <div class="login-wrapper">
    <div class="login-card">
        <h2>LOGIN</h2>
        <form>
            <div class="form-group">
                <label>EMAIL ADDRESS</label>
                <input type="email" required>
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" required>
            </div>
            <button type="submit" class="sign-btn">SIGN IN</button>
            <div class="form-footer">
                <a href="#">Forgot Password?</a>
                <a href="#">Create Account</a>
            </div>
        </form>
    </div>
</div>
